name: Build installers

# Build native installers for macOS, Windows, and Linux from one trigger. Run it
# manually (Actions tab → Run workflow) or automatically when a v* tag is pushed.
# Requires this repo to be on GitHub.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
          - os: windows-latest
            script: dist:win
          - os: ubuntu-latest
            script: dist:linux
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run ${{ matrix.script }}
      - uses: actions/upload-artifact@v5
        with:
          name: installers-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
